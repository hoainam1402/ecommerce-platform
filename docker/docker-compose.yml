# ============================================================
# E-Commerce Platform — Docker Compose (Local Development)
# Usage: docker compose up -d
# ============================================================

services:

  # ─── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecom_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ecom_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ecom_pass_local}
      POSTGRES_DB: ${DB_NAME:-ecom_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ecom_user} -d ${DB_NAME:-ecom_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecom_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass_local} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass_local}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Elasticsearch ───────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: ecom_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - "bootstrap.memory_lock=true"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── MinIO (S3-compatible local storage) ─────────────────
  minio:
    image: minio/minio:latest
    container_name: ecom_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_pass_local}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── MailHog (Email testing) ─────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: ecom_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    logging:
      driver: none    # Tắt log spam

  # ─── Redis Commander (Redis GUI) ─────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ecom_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-redis_pass_local}"
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - tools   # Chỉ chạy khi: docker compose --profile tools up

  # ─── pgAdmin (PostgreSQL GUI) ────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ecom_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools   # Chỉ chạy khi: docker compose --profile tools up

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  minio_data:

networks:
  default:
    name: ecom_network
